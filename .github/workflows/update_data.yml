name: Daily K-StockFlow Update

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sector Analysis
        run: python sector_analysis_final.py --refresh

      - name: Rename Output for Pages
        run: cp sector_performance_heatmap.html index.html

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sector_analysis_results.csv sector_stock_details.csv index.html
          git commit -m "chore: daily data update [skip ci]" || echo "No changes to commit"
          git push
