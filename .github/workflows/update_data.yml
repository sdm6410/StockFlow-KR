name: Daily K-StockFlow Update

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 09:00 KST (장시작)
    - cron: '0 3 * * 1-5'   # 12:00 KST (정오)
    - cron: '30 6 * * 1-5'  # 15:30 KST (장종료)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sector Analysis
        run: python sector_analysis_final.py --refresh

      - name: Rename Output for Pages
        run: cp sector_performance_heatmap.html index.html

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sector_analysis_results.csv sector_stock_details.csv index.html
          git commit -m "chore: daily data update [skip ci]" || echo "No changes to commit"
          git push
